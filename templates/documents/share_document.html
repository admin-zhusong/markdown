{% extends 'base.html' %}

{% block title %}分享文档 - {{ document.title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>分享设置 - {{ document.title }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-check-label">
                                <input type="checkbox" class="form-check-input" name="is_shared" {% if document.is_shared %}checked{% endif %}>
                                开启分享
                            </label>
                        </div>
                        
                        {% if document.is_shared %}
                        <div class="mb-3">
                            <label class="form-label">分享链接</label>
                            <div class="input-group">
                                <input type="text" class="form-control" value="{{ share_url }}" readonly>
                                <button type="button" class="btn btn-primary" onclick="copyLink()">复制链接</button>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">分享有效期</label>
                            <select class="form-select" name="expire_days">
                                <option value="0" {% if not document.share_expire %}selected{% endif %}>永久有效</option>
                                <option value="1" {% if document.share_expire and document.share_expire <= timezone.now|add:"1 day" %}selected{% endif %}>1天</option>
                                <option value="7" {% if document.share_expire and document.share_expire <= timezone.now|add:"7 days" %}selected{% endif %}>7天</option>
                                <option value="30" {% if document.share_expire and document.share_expire <= timezone.now|add:"30 days" %}selected{% endif %}>30天</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">分享密码（可选）</label>
                            <input type="password" class="form-control" name="share_password" placeholder="设置访问密码" value="{{ document.share_password }}">
                            <small class="text-muted">设置后访问者需要输入密码才能查看文档</small>
                        </div>
                        {% endif %}
                        
                        <button type="submit" class="btn btn-primary btn-block">保存设置</button>
                    </form>
                    
                    <a href="{% url 'edit_document' document_id=document.id %}" class="btn btn-secondary btn-block mt-2">返回编辑</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function copyLink() {
    const input = document.querySelector('input[readonly]');
    input.select();
    document.execCommand('copy');
    alert('链接已复制到剪贴板');
}
</script>
{% endblock %}
